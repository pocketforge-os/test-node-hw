name: OpenSCAD artifacts

on:
  push:
    paths:
      - "**/*.scad"
      - "mechanical/**/Makefile"
      - "mechanical/**/scripts/**"
      - "scripts/lint-openscad.sh"
      - "scripts/test-lint-openscad.sh"
      - ".github/workflows/openscad-artifacts.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: openscad-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: dut-fixture-v1
            path: mechanical/dut-fixture-v1
    steps:
      # The organization does not allow third-party checkout actions. Fetch the
      # immutable triggering commit directly, matching openscad-lint.yml.
      - name: Check out source
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${HEAD_SHA}"
          git checkout --detach FETCH_HEAD
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"

      - name: Install OpenSCAD
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes openscad xvfb

      - name: Build, preview, and validate
        env:
          PROJECT_PATH: ${{ matrix.project.path }}
        run: |
          set -euo pipefail
          xvfb-run --auto-servernum make -C "${PROJECT_PATH}" preview validate

      - name: Write artifact checksums
        env:
          PROJECT_PATH: ${{ matrix.project.path }}
        run: |
          set -euo pipefail
          cd "${PROJECT_PATH}/build"
          sha256sum -- *.stl layout-*.png > SHA256SUMS

      - name: Upload printable meshes and previews
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: openscad-${{ matrix.project.name }}-${{ github.sha }}
          path: |
            ${{ matrix.project.path }}/build/*.stl
            ${{ matrix.project.path }}/build/layout-*.png
            ${{ matrix.project.path }}/build/SHA256SUMS
          if-no-files-found: error
          compression-level: 9
          retention-days: 30
