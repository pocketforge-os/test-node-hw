# PR review — thin caller for the org peer-review merge gate (tsp-8ny, tsp-mx3).
#
# Copies the canonical thin caller from pocketforge-os/shared-workflows
# .github/workflows/pr-review.yml (the shared reusable workflows repo — see
# pr-review-gate.yml there for how the gate itself works). Keep the job id
# `pf-pr-review`: the org-wide required-check context "pf-pr-review / review"
# must be uniform across every repo for the org ruleset to gate on it.
#
# The @main reference is DELIBERATELY mutable, not a pinned SHA:
#   - the gate re-fetches its review tooling (scripts/review-pr.sh) from
#     pocketforge-automation origin/main at run time regardless, so a SHA pin
#     here would NOT pin behavior;
#   - gate fixes must roll out org-wide without N repo bumps;
#   - changes to the gate land through shared-workflows' own branch → PR →
#     peer-review flow (dogfooded on its own PRs by a local `uses: ./` caller
#     inside that repo).

name: PR review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

# One review RUN per PR: a new push cancels the superseded run AT TRIGGER TIME,
# so stale-head runs never sit in the queue holding saturated runner slots
# (tsp-ikk0.8; the gate's job-level concurrency only takes effect at job
# pickup, which is why queued duplicates accumulated). The group name MUST
# stay distinct from the gate job's group (`pf-pr-review-<repo>-<n>`):
# identical groups at workflow level and job level of the same run are
# detected by GitHub as a concurrency DEADLOCK and the review job is
# cancelled (github/vscode-github-actions#135) — do NOT "unify" the names.
concurrency:
  group: pf-pr-review-run-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pf-pr-review:
    uses: pocketforge-os/shared-workflows/.github/workflows/pr-review-gate.yml@main
